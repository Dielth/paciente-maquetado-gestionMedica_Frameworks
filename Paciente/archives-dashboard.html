<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ÍLION — Mine Archives</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- css -->
  <style>
  :root{
    --purple-dark:#55649e; --purple:#787fb0;
    --accent-mint:#94c2b2; --accent-light:#b2d9d7;
    --bg:#f5f5f0; --white:#ffffff; --black:#000000;
    --muted:#9a9dc4; --variante-muted:#bcbdd9; --f:'Poppins','Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--f);background:var(--bg);color:var(--black);min-height:100vh}

  /* ── Navbar ── */
  nav.topbar{height:38px;display:flex;align-items:stretch}
  .tab{padding:0 26px;font-size:13px;font-family:var(--f);cursor:pointer;border:none;
    display:flex;align-items:center;gap:5px;font-weight:400}
  .tab-home{background:var(--purple-dark);color:var(--white)}
  .tab-arch{background:var(--accent-light);color:var(--white);font-weight:600}
  .tab-prof{background:var(--accent-mint);color:var(--white)}

  /* ── Page bar ── */
  .page-bar{background:var(--accent-mint);padding:13px 24px;
    display:flex;align-items:center;justify-content:space-between}
  .page-bar h1{font-size:22px;font-weight:400;color:var(--white)}
  .btn-logout{background:var(--purple);border:none;color:var(--white);border-radius:20px;
    padding:6px 16px;font-size:12px;font-family:var(--f);cursor:pointer;
    display:flex;align-items:center;gap:4px}
  .btn-logout:hover{background:var(--purple-dark)}

  /* ── Layout ── */
  .layout{display:flex;padding:20px 20px;gap:16px;align-items:flex-start}

  /* ── Left nav panel ── */
  .nav-panel{
    width:180px;flex-shrink:0;
    background:#e0e0e0;
    border-radius:10px;
    padding:14px 0 20px;
    min-height:440px;
  }
  .nav-panel-title{
    font-size:12px;color:#888;font-weight:600;
    text-align:center;margin-bottom:12px;letter-spacing:.3px;
  }
  .nav-item{
    padding:10px 18px;font-size:13px;color:#333;
    cursor:pointer;background:none;border:none;
    font-family:var(--f);text-align:left;width:100%;
    transition:background .15s;
  }
  .nav-item:hover{background:rgba(120,127,176,.12)}
  .nav-item.active{font-weight:600;color:var(--purple-dark);
    background:rgba(120,127,176,.15)}

  /* ── Content panel ── */
  .content-panel{
    flex:1;
    background:#e0e0e0;
    border-radius:10px;
    padding:22px 26px;
    min-height:440px;
    position:relative;
  }
  .content-title{font-size:20px;font-weight:400;color:var(--black);margin-bottom:16px}

  /* Archive list */
  .archive-list{display:flex;flex-direction:column;gap:6px}
  .archive-item{
    font-size:13px;color:#444;padding:6px 4px;
    cursor:pointer;border-radius:5px;transition:background .15s;
    display:flex;align-items:center;gap:8px;
  }
  .archive-item:hover{background:rgba(120,127,176,.12);color:var(--purple-dark)}
  .archive-item::before{content:'📄';font-size:12px}

  /* Empty state */
  .empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:300px;color:#aaa;font-size:13px;gap:8px;
  }
  .empty-icon{font-size:36px;opacity:.5}

  /* Select archive button */
  .btn-select{
    position:absolute;bottom:20px;right:22px;
    background:var(--purple);color:var(--white);border:none;
    border-radius:20px;padding:10px 20px;font-size:13px;
    font-family:var(--f);cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  .btn-select:hover{background:var(--purple-dark)}

  /* Upload modal */
  .upload-modal{
    display:none;
    position:absolute;top:0;left:0;right:0;bottom:0;
    background:var(--purple-dark);
    border-radius:10px;
    padding:16px;
    z-index:10;
  }
  .upload-modal.open{display:block}
  .upload-inner{
    background:var(--white);
    border-radius:10px;
    height:100%;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:16px;
    position:relative;
  }
  .upload-ctrls{
    position:absolute;top:10px;right:12px;
    display:flex;gap:8px;
  }
  .upload-ctrl-btn{
    background:none;border:none;cursor:pointer;
    font-size:15px;color:#666;padding:0 2px;
  }
  .upload-ctrl-btn:hover{color:var(--black)}
  /* Drop zone icon */
  .drop-zone{
    width:180px;height:160px;
    border:2px dashed #ccc;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
  }
  .drop-zone svg{width:72px;height:72px;stroke:#bbb;fill:none;
    stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
  /* Drag over state */
  .upload-inner.dragover .drop-zone{border-color:var(--accent-mint);background:rgba(148,194,178,.06)}
  .btn-select-modal{
    background:var(--purple);color:var(--white);border:none;
    border-radius:20px;padding:9px 22px;font-size:13px;
    font-family:var(--f);cursor:pointer;
  }
  .btn-select-modal:hover{background:var(--purple-dark)}
  .drag-hint{font-size:13px;color:#888}

  /* Toast */
  .toast{display:none;position:fixed;bottom:20px;right:20px;
    background:var(--purple-dark);color:var(--white);
    padding:9px 17px;border-radius:9px;font-size:12px;
    z-index:200;box-shadow:0 4px 14px rgba(0,0,0,.16)}
  .toast.show{display:block}
  </style>
  <!-- css -->
</head>
<body>

<!-- NAVBAR -->
<nav class="topbar">
  <button class="tab tab-home" id="btnHome">🏠 Home</button>
  <button class="tab tab-arch">Archives</button>
  <button class="tab tab-prof" id="btnProfile">Profile</button>
</nav>

<!-- PAGE BAR -->
<div class="page-bar">
  <h1>Mine Archives</h1>
  <button class="btn-logout" id="btnLogout">💨 Log out</button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT: Navigation -->
  <div class="nav-panel">
    <div class="nav-panel-title">Navigation</div>
    <!--
      TODO: Categorías desde GET /api/archive-categories o estáticas según diseño
    -->
    <button class="nav-item active" data-cat="Radiografías">Radiografías</button>
    <button class="nav-item" data-cat="Estudios de laboratorio">Estudios de laboratorio</button>
    <button class="nav-item" data-cat="Rayos X">Rayos X</button>
    <button class="nav-item" data-cat="Análisis">Análisis</button>
    <button class="nav-item" data-cat="Exámenes">Exámenes</button>
  </div>

  <!-- RIGHT: Content -->
  <div class="content-panel">
    <div class="content-title" id="contentTitle">Radiografías</div>

    <!--
      TODO: Archivos desde GET /api/archives?patientId=&category=
      Mostrar lista si existen, empty state si no
    -->
    <div class="archive-list" id="archiveList">
      <!-- Lista vacía por defecto — se llenará dinámicamente con archivos subidos -->
    </div>

    <!-- Empty state — visible cuando no hay archivos en la categoría -->
    <div class="empty-state" id="emptyState">
      <span class="empty-icon">📂</span>
      <span>No archives in this category yet.</span>
      <span style="font-size:11.5px;color:#bbb">Use the button below to upload one.</span>
    </div>

    <!-- Upload modal — aparece al pulsar "Select an archive" -->
    <!--
      TODO: al confirmar → POST /api/archives { patientId, category, file }
      Respuesta: { id, name, url, uploadedAt }
    -->
    <div class="upload-modal" id="uploadModal">
      <div class="upload-inner" id="uploadInner">
        <div class="upload-ctrls">
          <button class="upload-ctrl-btn" id="btnModalMin">—</button>
          <button class="upload-ctrl-btn" id="btnModalClose">✕</button>
        </div>
        <div class="drop-zone" id="dropZone">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 12 15 15"/>
            <path d="M9 22H5a2 2 0 0 1-2-2v-1"/>
            <circle cx="12" cy="13" r="0"/>
          </svg>
        </div>
        <!-- hidden file input -->
        <input type="file" id="fileInput" accept="*/*" multiple style="display:none">
        <button class="btn-select-modal" id="btnSelectModal">Select an archive</button>
        <span class="drag-hint">or drag your files here</span>
      </div>
    </div>

    <!-- Select archive button -->
    <button class="btn-select" id="btnSelect">＋ Select an archive</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- js -->
<script>
(function(){

  function byId(id){ return document.getElementById(id); }
  function toast(msg){
    var t=byId('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); },3000);
  }

  /* ── NAV ── */
  byId('btnHome').addEventListener('click',function(){ window.location.href=''; });
  byId('btnProfile').addEventListener('click',function(){ window.location.href=''; });
  byId('btnLogout').addEventListener('click',function(){ window.location.href=''; });

  /* ── In-memory store per category (simula BD hasta integrar backend) ── */
  var store={
    'Radiografías':[],
    'Estudios de laboratorio':[],
    'Rayos X':[],
    'Análisis':[],
    'Exámenes':[]
  };
  var currentCat='Radiografías';

  /* ── Render list ── */
  function render(){
    var list=byId('archiveList');
    var empty=byId('emptyState');
    list.innerHTML='';
    var files=store[currentCat]||[];
    if(files.length===0){
      empty.style.display='flex';
    } else {
      empty.style.display='none';
      files.forEach(function(name){
        var div=document.createElement('div');
        div.className='archive-item';
        div.textContent=name;
        list.appendChild(div);
      });
    }
  }

  /* ── Category switching ── */
  var navItems=[].slice.call(document.querySelectorAll('.nav-item'));
  navItems.forEach(function(btn){
    btn.addEventListener('click',function(){
      navItems.forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentCat=btn.getAttribute('data-cat');
      byId('contentTitle').textContent=currentCat;
      render();
    });
  });

  /* ── Upload modal ── */
  function openModal(){ byId('uploadModal').classList.add('open'); }
  function closeModal(){ byId('uploadModal').classList.remove('open'); }

  byId('btnSelect').addEventListener('click', openModal);
  byId('btnModalClose').addEventListener('click', closeModal);
  byId('btnModalMin').addEventListener('click', closeModal);

  /* Click "Select an archive" inside modal → trigger file input */
  byId('btnSelectModal').addEventListener('click',function(){
    byId('fileInput').click();
  });

  /* File selected via input */
  byId('fileInput').addEventListener('change',function(){
    var files=this.files;
    if(!files||files.length===0) return;
    for(var i=0;i<files.length;i++){
      store[currentCat].push(files[i].name);
    }
    this.value='';
    closeModal();
    render();
    toast('✅ Archive uploaded to '+currentCat);
  });

  /* Drag & drop */
  var inner=byId('uploadInner');
  inner.addEventListener('dragover',function(e){
    e.preventDefault();
    inner.classList.add('dragover');
  });
  inner.addEventListener('dragleave',function(){
    inner.classList.remove('dragover');
  });
  inner.addEventListener('drop',function(e){
    e.preventDefault();
    inner.classList.remove('dragover');
    var files=e.dataTransfer.files;
    if(!files||files.length===0) return;
    for(var i=0;i<files.length;i++){
      store[currentCat].push(files[i].name);
    }
    closeModal();
    render();
    toast('✅ Archive uploaded to '+currentCat);
  });

  /* ── Init ── */
  render();

})();
</script>
<!-- js -->
</body>
</html>
